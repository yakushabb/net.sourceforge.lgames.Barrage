app-id: net.sourceforge.lgames.Barrage
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: barrage
rename-icon: barrage
rename-desktop-file: barrage.desktop
rename-appdata-file: barrage.metainfo.xml
finish-args:
  - --device=dri
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
cleanup:
  - /share/man
modules:
  - shared-modules/SDL/sdl12-compat.json
  - shared-modules/SDL/SDL_mixer-1.2.12.json

  - name: barrage
    buildsystem: autotools
    config-opts:
      - --localstatedir=/var/data
    post-install:
      - install -Dm644 barrage.png -t /app/share/icons/hicolor/128x128/apps/
      - install -Dm644 barrage.metainfo.xml -t /app/share/metainfo/
      - desktop-file-edit --add-category=ArcadeGame /app/share/applications/barrage.desktop
    sources:
      - type: archive
        url: https://sourceforge.net/projects/lgames/files/barrage/barrage-1.0.7.tar.gz
        sha256: 70662b1bb03815f879d4ac91f94a5e5aeec0e347aac48f20e0b79f048b35f248
      - type: patch
        paths:
          - patches/fix-gcc-15.patch
          - patches/fix-overflow.patch
          - patches/fix-a-typo.patch
      - type: file
        path: barrage.metainfo.xml
      - type: file
        path: barrage.png
